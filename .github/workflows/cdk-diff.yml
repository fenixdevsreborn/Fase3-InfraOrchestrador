# ------------------------------------------------------------------------------
# CDK Diff / Synth — validação em PRs
# Roda cdk synth e cdk diff para garantir que o app CDK está correto.
# ------------------------------------------------------------------------------

name: CDK Diff

on:
  pull_request:
    branches: [main]
    paths:
      - "cdk/**"
  push:
    branches: [main]
    paths:
      - "cdk/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  diff:
    name: CDK Synth & Diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cdk/package-lock.json

      - name: Install dependencies
        working-directory: cdk
        run: npm ci 2>/dev/null || npm install

      - name: CDK Synth
        working-directory: cdk
        run: npx cdk synth --quiet
        env:
          CDK_DEFAULT_ACCOUNT: "000000000000"
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
