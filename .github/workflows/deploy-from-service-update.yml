# ------------------------------------------------------------------------------
# Deploy a partir de atualização de serviço (FCG Infra Orchestrator)
# Recebe evento (repository_dispatch ou workflow_call) com service_name, image_tag,
# image_uri, commit_sha, environment; atualiza a variável Terraform da imagem e aplica.
# Deploy apenas do recurso impactado (Terraform altera só a imagem do serviço).
# ------------------------------------------------------------------------------

name: Deploy from service update

on:
  repository_dispatch:
    types: [deploy-request]
  workflow_call:
    inputs:
      service_name:
        description: 'Nome do serviço (users-api, games-api, payments-api, notification-lambda)'
        required: true
        type: string
      image_tag:
        description: 'Tag da imagem no ECR (ex: SHA curto)'
        required: true
        type: string
      image_uri:
        description: 'URI completa da imagem (registry/repo:tag)'
        required: false
        type: string
      commit_sha:
        description: 'Commit SHA do repositório do serviço'
        required: false
        type: string
      environment:
        description: 'Ambiente (prod, staging, demo)'
        required: false
        type: string
        default: prod

env:
  TF_INPUT: false
  TF_IN_AUTOMATION: true

jobs:
  deploy:
    name: Terraform apply (image update)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # para push de image_tags.auto.tfvars (opcional)
      id-token: write   # para OIDC com AWS
      pull-requests: read

    outputs:
      service_updated: ${{ steps.vars.outputs.service_name }}
      image_tag_applied: ${{ steps.vars.outputs.image_tag }}
      environment: ${{ steps.vars.outputs.environment }}
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}
      apply_exit_code: ${{ steps.apply.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TERRAFORM }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Normalize payload (repository_dispatch vs workflow_call)
        id: payload
        run: |
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "service_name=${{ github.event.inputs.service_name }}" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
            echo "image_uri=${{ github.event.inputs.image_uri }}" >> $GITHUB_OUTPUT
            echo "commit_sha=${{ github.event.inputs.commit_sha }}" >> $GITHUB_OUTPUT
            echo "environment=${{ github.event.inputs.environment || 'prod' }}" >> $GITHUB_OUTPUT
          else
            echo "service_name=${{ github.event.client_payload.service_name }}" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
            echo "image_uri=${{ github.event.client_payload.image_uri }}" >> $GITHUB_OUTPUT
            echo "commit_sha=${{ github.event.client_payload.commit_sha }}" >> $GITHUB_OUTPUT
            echo "environment=${{ github.event.client_payload.environment || 'prod' }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate service name
        id: vars
        run: |
          SVC="${{ steps.payload.outputs.service_name }}"
          case "$SVC" in
            users-api)           TFVAR="ecr_image_tag_users_api" ;;
            games-api)           TFVAR="ecr_image_tag_games_api" ;;
            payments-api)        TFVAR="ecr_image_tag_payments_api" ;;
            notification-lambda) TFVAR="ecr_image_tag_notification_lambda" ;;
            *)
              echo "::error::Serviço inválido: $SVC. Use: users-api, games-api, payments-api, notification-lambda"
              exit 1
              ;;
          esac
          echo "tfvar_name=$TFVAR" >> $GITHUB_OUTPUT
          echo "service_name=$SVC" >> $GITHUB_OUTPUT
          echo "image_tag=${{ steps.payload.outputs.image_tag }}" >> $GITHUB_OUTPUT
          echo "environment=${{ steps.payload.outputs.environment }}" >> $GITHUB_OUTPUT
          echo "✅ Serviço: $SVC → variável Terraform: $TFVAR"

      - name: Prepare image_tags.auto.tfvars
        run: |
          TFVAR="${{ steps.vars.outputs.tfvar_name }}"
          NEW_TAG="${{ steps.payload.outputs.image_tag }}"
          if [ ! -f image_tags.auto.tfvars ]; then
            if [ -f image_tags.auto.tfvars.example ]; then
              cp image_tags.auto.tfvars.example image_tags.auto.tfvars
              echo "Criado image_tags.auto.tfvars a partir do exemplo."
            else
              echo "ecr_image_tag_users_api              = \"latest\"" > image_tags.auto.tfvars
              echo "ecr_image_tag_games_api              = \"latest\"" >> image_tags.auto.tfvars
              echo "ecr_image_tag_payments_api           = \"latest\"" >> image_tags.auto.tfvars
              echo "ecr_image_tag_notification_lambda    = \"latest\"" >> image_tags.auto.tfvars
              echo "Criado image_tags.auto.tfvars com defaults."
            fi
          fi
          # Atualizar apenas a variável do serviço alterado (aceita com ou sem espaços à esquerda)
          sed -i "s/^[[:space:]]*${TFVAR}[[:space:]]*=[[:space:]]*.*/  ${TFVAR} = \"${NEW_TAG}\"/" image_tags.auto.tfvars
          echo "Atualizado: ${TFVAR} = ${NEW_TAG}"
          echo "--- image_tags.auto.tfvars ---"
          cat image_tags.auto.tfvars

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Terraform Init
        id: init
        run: terraform init -no-color -backend-config=environments/${{ steps.vars.outputs.environment }}/backend.hcl
        env:
          TF_VAR_environment: ${{ steps.vars.outputs.environment }}

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan -var-file=image_tags.auto.tfvars 2>&1 | tee plan.log
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          TF_VAR_environment: ${{ steps.vars.outputs.environment }}
          TF_VAR_postgres_master_password: ${{ secrets.TF_VAR_POSTGRES_MASTER_PASSWORD }}
        continue-on-error: true

      - name: Terraform Apply
        id: apply
        run: |
          terraform apply -no-color -auto-approve tfplan 2>&1 | tee apply.log
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          TF_VAR_environment: ${{ steps.vars.outputs.environment }}
          TF_VAR_postgres_master_password: ${{ secrets.TF_VAR_POSTGRES_MASTER_PASSWORD }}

      - name: Persist image_tags.auto.tfvars (opcional)
        if: success() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f image_tags.auto.tfvars
          git diff --staged --quiet || (git commit -m "chore(infra): update image tag ${{ steps.vars.outputs.service_name }} to ${{ steps.payload.outputs.image_tag }}" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## Deploy from service update" >> $GITHUB_STEP_SUMMARY
          echo "- **Serviço:** ${{ steps.vars.outputs.service_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag:** ${{ steps.payload.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Ambiente:** ${{ steps.vars.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Plan:** exit ${{ steps.plan.outputs.exitcode }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Apply:** exit ${{ steps.apply.outputs.exitcode }}" >> $GITHUB_STEP_SUMMARY
