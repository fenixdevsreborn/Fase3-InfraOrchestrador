# terraform-bootstrap.yml
# Cria o bucket S3 e a tabela DynamoDB para o backend remoto do Terraform.
# Executar UMA VEZ (manual) antes do primeiro terraform plan/apply em CI.
# Requer: AWS_ROLE_ARN (variable) com permissão para s3:CreateBucket, dynamodb:CreateTable, etc.

name: Terraform Bootstrap (Backend S3 + DynamoDB)

on:
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_STATE_BUCKET: fcg-fenix-tfstate
  TF_LOCK_TABLE: fcg-fenix-tfstate-lock

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    name: Create S3 bucket and DynamoDB lock table
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 bucket for Terraform state
        run: |
          if aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            echo "Bucket $TF_STATE_BUCKET already exists."
          else
            aws s3api create-bucket --bucket "$TF_STATE_BUCKET" --region "$AWS_REGION"
            aws s3api put-bucket-versioning --bucket "$TF_STATE_BUCKET" --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$TF_STATE_BUCKET" --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            echo "Bucket $TF_STATE_BUCKET created with versioning and encryption."
          fi
        env:
          TF_STATE_BUCKET: ${{ env.TF_STATE_BUCKET }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Create DynamoDB table for state lock
        run: |
          if aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" 2>/dev/null; then
            echo "Table $TF_LOCK_TABLE already exists."
          else
            aws dynamodb create-table \
              --table-name "$TF_LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"
            echo "Waiting for table to be active..."
            aws dynamodb wait table-exists --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION"
            echo "Table $TF_LOCK_TABLE created."
          fi
        env:
          TF_LOCK_TABLE: ${{ env.TF_LOCK_TABLE }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Bootstrap summary
        run: |
          echo "Backend resources ready for Terraform:"
          echo "  S3 bucket: $TF_STATE_BUCKET"
          echo "  DynamoDB table: $TF_LOCK_TABLE"
          echo "  Region: $AWS_REGION"
          echo ""
          echo "Next: run Terraform Plan (PR) or Terraform Apply (push to master) to provision infra (VPC, ECR, EC2, ALB, etc.)."
        env:
          TF_STATE_BUCKET: ${{ env.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ env.TF_LOCK_TABLE }}
          AWS_REGION: ${{ env.AWS_REGION }}
