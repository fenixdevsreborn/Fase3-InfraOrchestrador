# ------------------------------------------------------------------------------
# CDK Deploy — deploy manual da infra na AWS (produção)
# Exige secret AWS_ROLE_ARN_CDK (OIDC). Ver docs/OIDC.md e cdk/README.md.
# ------------------------------------------------------------------------------

name: CDK Deploy

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack a fazer deploy (deixe vazio para todas)"
        required: false
        type: string
        default: ""
      approve:
        description: "Executar deploy (confirme com 'yes')"
        required: true
        type: choice
        options:
          - "yes"
          - "no"
        default: "no"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: CDK Deploy
    if: inputs.approve == 'yes'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cdk/package-lock.json

      - name: Install dependencies
        working-directory: cdk
        run: npm ci 2>/dev/null || npm install

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CDK }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: CDK Bootstrap (uma vez por conta; idempotente)
        working-directory: cdk
        run: npx cdk bootstrap

      - name: CDK Deploy
        working-directory: cdk
        run: |
          if [ -n "${{ inputs.stack }}" ]; then
            npx cdk deploy "${{ inputs.stack }}" --require-approval never --outputs-file cdk-outputs.json
          else
            npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json
          fi

      - name: Summary
        if: success()
        run: |
          echo "## CDK Deploy — Produção" >> $GITHUB_STEP_SUMMARY
          echo "- **Stack(s):** ${{ inputs.stack || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** ${{ vars.AWS_REGION || 'us-east-1' }}" >> $GITHUB_STEP_SUMMARY
          if [ -f cdk/cdk-outputs.json ]; then
            echo "### Outputs" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat cdk/cdk-outputs.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
