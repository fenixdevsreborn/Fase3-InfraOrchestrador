# /opt/fcg-fenix/gamesapi/docker-compose.yml

services:
  app:
    image: ${ECR_REGISTRY}:${IMAGE_TAG}
    container_name: fcg-fenix-gamesapi
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fcg_games}
    volumes:
      - games_pgdata:/var/lib/postgresql/data
    # ALB/target group usam porta 80 na EC2.
    ports:
      - "80:8080"
    restart: unless-stopped

volumes:
  games_pgdata:
